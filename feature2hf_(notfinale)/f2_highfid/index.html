      const [developerIdInput, setDeveloperIdInput] = useState('');
      const [trainingSummary, setTrainingSummary] = useState('');
      const [modelParams, setModelParams] = useState('');
      const [scanFlags, setScanFlags] = useState(null); // null | []

      // Justification States
      const [justification1, setJustification1] = useState('');
      const [justification2, setJustification2] = useState('');

      // Audit role selector
      const [auditViewerRole, setAuditViewerRole] = useState('compliance');

      const activeApplicant = useMemo(() => {
        return applicants.find(a => a.id === activeApplicantId) || applicants[0];
      }, [applicants, activeApplicantId]);

      const selectedRecord = useMemo(() => {
        return auditLogs.find(r => r.id === selectedRecordId);
      }, [auditLogs, selectedRecordId]);

      // Handle Toast Notifications
      const triggerToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 4000);
      };

      // Set page Title according to active view
      const viewTitle = useMemo(() => {
        switch (currentView) {
          case 'dashboard': return 'Dashboard Overview';
          case 'evaluate-candidate': return 'Candidate Evaluation';
          case 'decision-result': return 'Decision Feedback';
          case 'document-model': return 'Model Parameters Record';
          case 'justification-gate': return 'Justification Gate';
          case 'screening-audit-log': return 'Screening Decision Records';
          case 'decision-record-detail': return `Decision Record Details: ${selectedRecordId || ''}`;
          case 'application-status': return 'My Application Status';
          case 'ai-evaluated-me': return 'How the AI Evaluated Me';
          default: return 'FaiRe Ethical Auditing';
        }
      }, [currentView, selectedRecordId]);

      // Adjust views when mode changes to keep consistent state
      const handleModeChange = (mode) => {
        setViewMode(mode);
        if (mode === 'applicant') {
          setCurrentView('application-status');
        } else {
          setCurrentView('dashboard');
        }
      };

      // Expose switch view helpers
      const handleGoToView = (view) => {
        setCurrentView(view);
      };

      // Run candidate evaluation
      const handleRunEvaluation = () => {
        setCurrentView('decision-result');
        triggerToast('Evaluation complete. Decision verified against rules.');
      };

      // Model scan
      const handleScanParameters = () => {
        if (!modelIdInput || !modelParams) {
          triggerToast('Please provide Model ID and Model Parameters.');
          return;
        }
        // Simulated scan matches
        setScanFlags([
          { param: 'age_threshold', risk: 'Possible age-based filtering' },
          { param: 'years_experience_minimum', risk: 'Potential proxy for age discrimination' }
        ]);
        triggerToast('Model scanned. Sensitive parameters identified.');
      };

      // Save Model Justifications and insert transaction to logs
      const handleSaveModelJustification = () => {
        if (justification1.length < 50 || justification2.length < 50) {
          triggerToast('Each parameter requires a minimum 50 character justification.');
          return;
        }

        const newId = `REC-00${auditLogs.length + 1}`;
        const newRecord = {
          id: newId,
          candidateId: 'MODEL-AUDIT',
          timestamp: new Date().toISOString().replace('T', ' ').slice(0, 16),
          decision: 'Accept',
          missingCriteria: '—',
          createdBy: developerIdInput || 'DEV-042',
          hash: Math.random().toString(16).substring(2, 10) + '...' + Math.random().toString(16).substring(2, 10),
          parameters: `age_threshold justified, experience justified. model_id=${modelIdInput || 'MODEL-2025-001'}`,
          weights: 'Documented'
        };

        setAuditLogs([newRecord, ...auditLogs]);
        triggerToast('Justifications saved successfully! Audit block sealed and signed.');

        setModelIdInput('');
        setDeveloperIdInput('');
        setTrainingSummary('');
        setModelParams('');
        setScanFlags(null);
        setJustification1('');
        setJustification2('');

        // Switch back to model page or logs
        setCurrentView('screening-audit-log');

                  <span>{toast}</span>

              <AnimatePresence mode="wait">

                  initial={{ opacity: 0, y: 15 }}
                  animate={{ opacity: 1, y: 0 }}
                  exit={{ opacity: 0, y: -15 }}
                  transition={{ duration: 0.28, ease: 'easeInOut' }}
                  className="h-full"
                >

                  {/* ──────────────────────────────────────────────────────────
                      0. VIEW: Dashboard Overview

                  {currentView === 'dashboard' && (

                        <p className="text-sm text-slate-600 leading-relaxed font-medium">
                          After reviewing your application, our system found that you did not meet 2 of the required criteria for this role. This decision was made automatically based on the job requirements set by the employer.
                        </p>

                        <div className="flex flex-wrap gap-2.5 pt-2">
                          {activeApplicant.criteria.filter(c => !c.found).map((crit, idx) => (
                            <span key={idx} className="inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold text-red-500 bg-rose-50 border border-rose-100 font-display">
                              ✗ {crit.name}
                            </span>
                          ))}
                        </div>

                        <div className="p-4 rounded-xl bg-brand-accent/40 border border-brand/10 text-xs font-semibold text-brand-dark flex items-center gap-2">
                          <span>ℹ️ This feedback was generated automatically and sent to you immediately. No human read your personal details.</span>
                        </div>
                      </div>

                      {/* Success items box */}
                      <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-soft space-y-4">
                        <h3 className="font-bold font-display text-slate-800 text-sm tracking-wide border-b border-slate-50 pb-3">What you did well</h3>
                        <div className="flex flex-wrap gap-2.5">
                          {activeApplicant.criteria.filter(c => c.found).map((crit, idx) => (
                            <span key={idx} className="inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 font-display">
                              ✓ {crit.name}
                            </span>
                          ))}
                        </div>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">These skills matched the job requirements successfully.</p>
                      </div>

                    </div>
                  )}

                  {/* ──────────────────────────────────────────────────────────
                      8. VIEW: How the AI Evaluated Me (Applicant View)
                  ────────────────────────────────────────────────────────── */}
                  {currentView === 'ai-evaluated-me' && (
                    <div className="space-y-6 max-w-4xl">

                      {/* Top banner note */}
                      <div className="bg-white border-l-4 border-brand border-y border-r border-slate-100 rounded-2xl p-5 shadow-soft">
                        <p className="text-sm font-semibold text-slate-600 leading-relaxed">
                          This system is required to show you how it made its decision. No criteria were hidden from you.
                        </p>
                      </div>

                      {/* Criteria table */}
                      <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-soft space-y-4">
                        <h3 className="font-bold font-display text-slate-800 text-sm tracking-wide border-b border-slate-50 pb-3">What the AI checked</h3>

                        <div className="overflow-x-auto">
                          <table className="w-full text-left text-xs border-collapse">
                            <thead>
                              <tr className="text-slate-400 font-bold uppercase tracking-wider border-b border-slate-100">
                                <th className="py-3">Criteria</th>
                                <th className="py-3">Required</th>
                                <th className="py-3">Your Profile</th>
                                <th className="py-3 text-right">Result</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50 font-semibold text-slate-700 text-xs">
                              {activeApplicant.criteria.map((crit, idx) => (
                                <tr key={idx} className={crit.found ? 'text-slate-700' : 'text-slate-500'}>
                                  <td className="py-4 font-bold">{crit.name}</td>
                                  <td className="py-4">{crit.required ? 'Yes' : 'No'}</td>
                                  <td className="py-4">{crit.detail}</td>
                                  <td className={`py-4 text-right font-black uppercase tracking-wider ${crit.found ? 'text-brand' : 'text-red-500'
                                    }`}>
                                    {crit.result}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>

                      {/* Weight progress bars */}
                      <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-soft space-y-5">
                        <h3 className="font-bold font-display text-slate-800 text-sm tracking-wide border-b border-slate-50 pb-3">Decision weighting</h3>

                        <div className="space-y-5">
                          {activeApplicant.weights.map((w, idx) => (
                            <div key={idx} className="space-y-2">
                              <div className="flex justify-between text-xs font-bold text-slate-700">
                                <span>{w.label}</span>
                                <span className="text-brand font-black">{w.pct}% weight</span>
                              </div>
                              <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                <div
                                  style={{ width: `${w.pct}%` }}
                                  className={`h-full rounded-full transition-all duration-500 ${w.type === 'skills'
                                      ? 'bg-brand'
                                      : 'bg-gradient-to-r from-brand to-brand-light'
                                    }`}
                                />
                              </div>
                            </div>
                          ))}
                        </div>

                        <p className="text-xs font-semibold text-slate-400 mt-4 leading-relaxed">
                          Your overall match score: <strong className="text-slate-700">{activeApplicant.matchScore}%</strong> — Minimum required: <strong className="text-slate-700">{activeApplicant.minRequiredScore}%</strong> of mandatory criteria must be met.
                        </p>
                      </div>

                      {/* Model parameters cards */}
                      <div className="bg-white border border-slate-100 rounded-2xl p-6 shadow-soft space-y-4">
                        <h3 className="font-bold font-display text-slate-800 text-sm tracking-wide border-b border-slate-50 pb-3">About the AI model used</h3>

                        <div className="space-y-4 text-xs font-semibold text-slate-600">
                          <div className="flex justify-between items-baseline py-2 border-b border-slate-50">
                            <span className="text-slate-400 font-bold uppercase tracking-wider font-display">Model ID</span>
                            <span className="font-bold text-slate-800">{activeApplicant.model.id}</span>
                          </div>
                          <div className="flex justify-between items-baseline py-2 border-b border-slate-50">
                            <span className="text-slate-400 font-bold uppercase tracking-wider font-display">Last Documented</span>
                            <span className="font-semibold text-slate-800">{activeApplicant.model.lastDocumented}</span>
                          </div>
                          <div className="flex justify-between items-baseline py-2 border-b border-slate-50">
                            <span className="text-slate-400 font-bold uppercase tracking-wider font-display">Sensitive Parameters Reviewed</span>
                            <span className="font-semibold text-slate-800">✅ Yes — {activeApplicant.model.sensitiveParamsNote}</span>
                          </div>
                          <div className="flex justify-between items-baseline py-2">
                            <span className="text-slate-400 font-bold uppercase tracking-wider font-display">Documentation Status</span>
                            <span className="font-bold text-brand">✅ {activeApplicant.model.documentationStatus}</span>
                          </div>
                        </div>

                        <div className="p-4 rounded-xl bg-brand-accent/40 border border-brand/10 text-xs font-semibold text-brand-dark flex items-center gap-2 mt-4">
                          <span>You have the right to know which AI model evaluated you and that it was reviewed for bias before deployment.</span>
                        </div>
                      </div>

                    </div>
                  )}

                </M.div>
              </AnimatePresence>
            </main>
          </div>

        </div>
      );
    }

    // ─── RENDER REACT APPLICATION ───────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
