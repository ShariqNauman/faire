            )
        };

        // Premium Typewriter component (Smooth, iterative, un-slop)
        const Typewriter = ({ phrases, speed = 60, eraseSpeed = 30, delay = 2200 }) => {
            const [text, setText] = useState('');
            const [phraseIndex, setPhraseIndex] = useState(0);
            const [isDeleting, setIsDeleting] = useState(false);

            useEffect(() => {
                let timer;
                const activePhrase = phrases[phraseIndex];

                if (isDeleting) {
                    timer = setTimeout(() => {
                        setText(prev => prev.substring(0, prev.length - 1));
                    }, eraseSpeed);
                } else {
                    timer = setTimeout(() => {
                        setText(activePhrase.substring(0, text.length + 1));
                    }, speed);
                }

                // Pauses when phrase is fully typed
                if (!isDeleting && text === activePhrase) {
                    timer = setTimeout(() => setIsDeleting(true), delay);
                }
                // Goes to next phrase when erased
                else if (isDeleting && text === '') {
                    setIsDeleting(false);
                    setPhraseIndex(prev => (prev + 1) % phrases.length);
                }

                return () => clearTimeout(timer);
            }, [text, isDeleting, phraseIndex, phrases]);

            return (
                <span className="inline-block relative min-h-[3.6rem] md:min-h-[4.5rem]">
                    <span className="bg-gradient-to-r from-brand via-brand-light to-brand bg-clip-text text-transparent font-black leading-none">{text}</span>
                    <span className="ml-1 inline-block w-1 h-8 md:h-12 bg-brand animate-ping absolute bottom-1">&nbsp;</span>
                </span>
            );
        };

        const M = motion ? motion : {
            div: ({ children, className, ...props }) => <div className={className} {...props}>{children}</div>,

            button: ({ children, className, ...props }) => <button className={className} {...props}>{children}</button>

        function App() {

            const [currentTab, setCurrentTab] = useState('home');
            const [perspective, setPerspective] = useState('reviewer'); // Compliance reviewer Sarah starts

            // Regulatory mappings: available perspectives inside each active tab
            const allowedPerspectivesByTab = {
                home: [
                    { value: 'reviewer', label: 'Compliance Reviewer (Sarah)', icon: '🛡️' },
                    { value: 'developer', label: 'Lead Developer (Arjun)', icon: '💻' },
                    { value: 'candidates', label: 'Job Applicant (Robert / Amy)', icon: '👤' },
                    { value: 'auditor', label: 'EEOC Investigator (Elena)', icon: '🔍' }
                ],
                checkpoints: [
                    { value: 'reviewer', label: 'Compliance Reviewer (Sarah)', icon: '🛡️' },

                bias_audit: [
                    { value: 'developer', label: 'Lead Developer (Arjun)', icon: '💻' },
                    { value: 'reviewer', label: 'Compliance Reviewer (Sarah)', icon: '🛡️' }
                ],
                transparency: [
                    { value: 'candidates', label: 'Job Applicant (Robert / Amy)', icon: '👤' },
                    { value: 'developer', label: 'Lead Developer (Arjun)', icon: '💻' },
                    { value: 'auditor', label: 'EEOC Investigator (Elena)', icon: '🔍' }
                ],
                comparative_dashboard: [
                    { value: 'candidates', label: 'Job Applicant (Robert / Amy)', icon: '👤' },
                    { value: 'developer', label: 'Lead Developer (Arjun)', icon: '💻' },
                    { value: 'reviewer', label: 'Compliance Reviewer (Sarah)', icon: '🛡️' },
                    { value: 'auditor', label: 'EEOC Investigator (Elena)', icon: '🔍' }
                ]

            // Switch perspective automatically to allowed role when the user switches tabs
            useEffect(() => {
                const allowedOptions = allowedPerspectivesByTab[currentTab].map(opt => opt.value);
                if (!allowedOptions.includes(perspective)) {
                    setPerspective(allowedOptions[0]);
                }
            }, [currentTab]);

            // SECTION 1: SYSTEM STATE SPECIFICATIONS FOR CHECKPOINTS (F3)
            const [checkpoints, setCheckpoints] = useState({
                stage1: { id: 1, name: 'Pre-Development Review', status: 'pending', reviewer: 'Sarah (Compliance)', desc: 'Audit spec sheets against employment laws. Identify and strip out flag-violating rules.' },
                stage2: { id: 2, name: 'Pre-Testing Fairness Review', status: 'locked', reviewer: 'Sarah (Compliance)', desc: 'Verify statistical parity and model re-tuning outputs.' },
                stage3: { id: 3, name: 'Pre-Deployment Signed-Off', status: 'locked', reviewer: 'Sarah (Compliance)', desc: 'Run full pipeline test and issue mathematical confirmation locks.' }
            });

            const [plannedFeatures, setPlannedFeatures] = useState([
                { id: 'f1', name: 'Resume parsing and structural extraction', lawStatus: 'Compliant', desc: 'Isolates candidate skills, and qualifications parameters.', lawCode: 'Standard Spec' },
                { id: 'f2', name: 'Work history total tenure summerizer', lawStatus: 'Compliant', desc: 'Aggregates experience lengths for seniority rank.', lawCode: 'Standard Spec' },
                { id: 'f3', name: 'Automatic age-bracket filter', lawStatus: 'VIOLATIVE', isIllegal: true, desc: 'Filters out and rejects candidate profiles over age 55 (iTutor baseline specification).', lawCode: 'ADEA / EEOC Violation' },
                { id: 'f4', name: 'College history and degree parser', lawStatus: 'Compliant', desc: 'Logs academic credentials and universities.', lawCode: 'Standard Spec' }
            ]);

            const isStage1Approved = plannedFeatures.every(f => !f.isIllegal);

            useEffect(() => {
                if (isStage1Approved && checkpoints.stage1.status === 'pending') {
                    setCheckpoints(prev => ({
                        ...prev,
                        stage1: { ...prev.stage1, status: 'completed' },
                        stage2: { ...prev.stage2, status: 'pending' }

                    setCheckpoints(prev => ({
                        ...prev,
                        stage1: { ...prev.stage1, status: 'pending' },
                        stage2: { ...prev.stage2, status: 'locked' },
                        stage3: { ...prev.stage3, status: 'locked' }

            const [checkpoint3Signed, setCheckpoint3Signed] = useState(false);

            // SECTION 2: SYSTEM STATE SPECIFICATIONS FOR BIAS AUDIT (F1)
            const [rawData, setRawData] = useState([

            // Adversarial Debiasing Engine
            const [adversaryStatus, setAdversaryStatus] = useState('idle'); // idle, scanned, debiased
            const [isAdversaryScanning, setIsAdversaryScanning] = useState(false);
            const [adversaryAccuracy, setAdversaryAccuracy] = useState(94); // initial proxy detection rate

            const [proxiesDetected, setProxiesDetected] = useState([

            // Model Training Weights
            const [trainingWeights, setTrainingWeights] = useState({

            const [applicantCriteriaShown, setApplicantCriteriaShown] = useState(true);
            const [honestJustifications, setHonestJustifications] = useState([
                { parameter: 'graduation_year_weight', coefficient: '7.5', documented: false, text: '' },
                { parameter: 'retirement_benefit_index', coefficient: '4.2', documented: false, text: '' }
            ]);
            const [isProcessDocumented, setIsProcessDocumented] = useState(false);

            // Cryptographic Ledger database screening log rows
            const [screeningLedger, setScreeningLedger] = useState([
                { id: 'REC-201', name: 'Sarah Jenkins', age: 31, decision: 'Accepted (Interview)', criteria: 'React 3+ years, Node.js', hash: '8f2a1b9c3f7d10e', prevHash: '000000000000000' },
                { id: 'REC-202', name: 'Robert Vance', age: 62, decision: 'Rejected (Skill Gap)', criteria: 'Missing React 3+ years', hash: '5e4d3c2b1a9f8e7', prevHash: '8f2a1b9c3f7d10e' }
            ]);
            const [isLedgerTampered, setIsLedgerTampered] = useState(false);

            // Candidate submits resume (Robert 62 / Amy 24)
            const [selectedCandidate, setSelectedCandidate] = useState('robert');
            const [candidateDetails, setCandidateDetails] = useState({
                robert: { name: 'Robert Vance', age: 62, experience: '35 Years', skills: 'Python, SQL databases, C++ architectures, Structural Management', missing: ['React Stack Frameworks', 'Cloud Automation Certifications'] },
                amy: { name: 'Amy Lee', age: 24, experience: '2 Years', skills: 'React Stack Frameworks, Tailwind CSS styling, Node.js, Git', missing: ['Python Backend Integration', 'Large-Scale Performance Architecting'] }
            });
            const [applicantLog, setApplicantLog] = useState(null);

            // ACTIONS COMPLIANCE HANDLERS
            const handleStripExplicitFields = () => {
                setIsExplicitFieldsStripped(true);
                setRawData(prev => prev.map(item => ({ ...item, explicitStripped: true })));
            };

            const scanAdversarialModel = () => {
                setIsAdversaryScanning(true);
                setTimeout(() => {
                    setIsAdversaryScanning(false);
