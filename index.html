<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaiRe | Ethical AI Hiring Infrastructure</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="./styles/global.css">

    <style>
        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 2rem;
            margin-top: -2rem;
            /* Move everything slightly upwards */
        }

        .hero-title {
            font-size: 8rem;
            font-weight: 800;
            color: var(--white);
            margin-bottom: 0.5rem;
            line-height: 1;
            position: relative;
        }

        .hero-title span {
            color: var(--yellow);
        }

        .hero-subtitle {
            font-family: 'IBM Plex Mono', monospace;
            color: var(--muted);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            min-height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 8px;
            height: 1.1em;
            background-color: var(--yellow);
            margin-left: 6px;
            animation: cursor-blink 0.8s infinite;
        }

        @keyframes cursor-blink {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Decorative squiggly lines top-right corner -->
    <svg style="position: fixed; top: 0; right: 0; width: 300px; height: 300px; pointer-events: none; z-index: 0; opacity: 0.6;" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Lines from the right edge near top, flowing diagonally down-left -->
        <path d="M300,0 C265,18 232,14 202,48 C172,82 186,108 155,138 C124,168 90,155 62,188" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M300,32 C264,50 230,47 200,80 C170,113 184,139 153,169 C130,190 106,182 85,208" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M300,64 C266,80 236,78 208,110 C180,142 192,165 165,192 C148,208 128,205 110,226" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M300,96 C268,110 242,110 218,138 C194,166 204,186 180,210 C165,224 148,224 132,244" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <!-- Lines from the top edge near right, flowing diagonally down-left -->
        <path d="M268,0 C248,20 218,16 190,50 C162,84 175,110 146,140 C120,166 90,156 66,186" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M236,0 C215,20 185,16 158,48 C131,80 144,106 114,136 C90,160 64,152 44,178" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M204,0 C183,18 155,15 128,45 C101,75 114,100 86,128 C66,148 44,142 26,166" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <path d="M172,0 C152,16 126,14 100,42 C74,70 86,92 60,118 C44,134 26,130 10,152" stroke="#FBBD0D" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </svg>

    <main class="home-container">
        <div style="display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 0.5rem;">
            <img src="./logo_transparent.png" alt="FaiRe Flame Logo" class="hero-logo stagger-in" style="height: 120px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(251, 189, 13, 0.15));">
            <h1 class="hero-title stagger-in" style="text-transform: uppercase; font-size: 8.5rem; font-family: 'Syne', sans-serif; background: linear-gradient(to right, #E8B923, #A8914B, #787677); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; line-height: 1;">FAIRE</h1>
        </div>
        <p class="hero-subtitle stagger-in">
            <span class="typewriter-text">Ethical AI Hiring Infrastructure</span><span class="typewriter-cursor"></span>
        </p>

        <div class="card-grid">
            <a href="applicant/apply.html" class="role-card stagger-in">
                <i data-lucide="user" width="32" height="32"></i>
                <div class="card-graphic">
                    <i data-lucide="fingerprint"></i>
                </div>
                <div>
                    <h2>Applicant</h2>
                    <p>Apply and view AI screening decisions</p>
                </div>
            </a>

            <a href="business/records.html" class="role-card stagger-in">
                <i data-lucide="building-2" width="32" height="32"></i>
                <div class="card-graphic">
                    <i data-lucide="shield-check"></i>
                </div>
                <div>
                    <h2>Business</h2>
                    <p>Review hiring records & compliance checkpoints</p>
                </div>
            </a>

            <a href="developer/data-audit.html" class="role-card stagger-in">
                <i data-lucide="code-2" width="32" height="32"></i>
                <div class="card-graphic">
                    <i data-lucide="terminal"></i>
                </div>
                <div>
                    <h2>Developer</h2>
                    <p>Audit data, train models & check bias</p>
                </div>
            </a>
        </div>
    </main>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./scripts/shared.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Trigger load animation utilizing the shared script function
            window.FaiRe.staggerPageIn('.stagger-in');
            initTypewriter();
        });

        function initTypewriter() {
            const textElement = document.querySelector('.typewriter-text');
            if (!textElement) return;

            const phrases = [
                "Ethical AI Hiring Infrastructure",
                "Bias-Free Regulatory Pipelines",
                "Trust & Compliance Parity Matrix"
            ];

            let index = 0;
            let charIndex = 0;
            let isDeleting = false;
            let timer = null;

            textElement.textContent = "";

            function play() {
                const currentText = phrases[index];

                if (isDeleting) {
                    textElement.textContent = currentText.substring(0, charIndex - 1);
                    charIndex--;
                } else {
                    textElement.textContent = currentText.substring(0, charIndex + 1);
                    charIndex++;
                }

                let speed = isDeleting ? 30 : 65;

                if (!isDeleting && charIndex === currentText.length) {
                    speed = 2800; // Hold phrase
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    index = (index + 1) % phrases.length;
                    speed = 500;
                }
                timer = setTimeout(play, speed);
            }

            timer = setTimeout(play, 2000);
        }
    </script>
</body>

</html>
